<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — FeedMe</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🍔</div>
      <h1>FeedMe</h1>
      <p class="auth-tagline">Welcome back</p>
    </div>

    <form id="loginForm" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary full-width" id="submitBtn">Sign In</button>
      <div id="formError" class="form-error"></div>
    </form>

    <div class="switch-auth">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </div>

  <div class="auth-side">
    <div class="auth-side-content">
      <h2>Order from your favourite restaurants</h2>
      <p>Fast delivery · Wide selection · Easy ordering</p>
      <div class="feature-list">
        <div class="feature-item">🍕 30+ restaurants</div>
        <div class="feature-item">⚡ 25-45 min delivery</div>
        <div class="feature-item">💳 Secure payments</div>
        <div class="feature-item">⭐ Real-time tracking</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { signIn, getProfile } from '../assets/js/services/auth.js';

  const form = document.getElementById('loginForm');
  const errorBox = document.getElementById('formError');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      await signIn({ email, password });
      // Role comes from the database, NOT from a form field.
      const profile = await getProfile();
      if (!profile) {
        errorBox.textContent = 'Your account has no profile. Contact support.';
        return;
      }
      window.location.href = profile.role === 'restaurant'
        ? '../views/restaurant/dashboard.html'
        : '../views/customer/home.html';
    } catch (err) {
      errorBox.textContent = err.message || 'Could not sign in.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
