<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedMe – Menu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon-sm">🍔</div>
    <div>
      <span class="logo-text">FeedMe</span>
      <div class="location">📍 Toronto, ON &nbsp; ⏱ 30-40 min</div>
    </div>
  </div>
  <button class="cart-float-btn" onclick="toggleCart()">
    🛒 <span id="cartBadge" class="cart-badge hidden">0</span>
  </button>
</header>

<div class="yellow-bar"></div>

<div class="menu-layout">
  <div class="menu-main">

    <!-- Restaurant Info Banner -->
    <div class="restaurant-banner">
      <a href="index.html" class="back-link">← Back to restaurants</a>
      <h1 id="restName">Loading…</h1>
      <p id="restDesc" class="rest-desc-text"></p>
      <div class="rest-meta-row">
        <span id="restRating"></span>
        <span id="restTime"></span>
        <span id="restPrice"></span>
      </div>
    </div>

    <!-- Search & Category Filters -->
    <div class="search-section" style="margin-top: 24px;">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="menuSearch" placeholder="What are you craving?" oninput="renderMenu()">
      </div>
    </div>

    <section class="categories" id="menuCategories"></section>

    <div class="food-grid" id="foodGrid"></div>
  </div>

  <!-- Cart Sidebar -->
  <aside class="cart-sidebar" id="cartSidebar">
    <h3 class="cart-title">🛒 Your Cart (<span id="cartCount">0</span>)</h3>
    <div id="cartItems" class="cart-items-list">
      <div class="cart-empty">
        <div class="cart-empty-icon">🍕</div>
        <p>Nothing here yet</p>
        <small>Add some yummy food!</small>
      </div>
    </div>
    <div id="cartFooter" class="cart-footer hidden">
      <div class="cart-total-row">
        <span>Subtotal</span>
        <span>$<span id="cartSubtotal">0.00</span></span>
      </div>
      <div class="cart-total-row">
        <span>Delivery</span>
        <span>$2.99</span>
      </div>
      <div class="cart-total-row total-bold">
        <span>Total</span>
        <span>$<span id="cartTotal">0.00</span></span>
      </div>
      <button class="btn-primary full-width" onclick="goToCheckout()">Proceed to Checkout →</button>
    </div>
  </aside>
</div>

<!-- Dimmed overlay behind the cart on mobile -->
<div class="cart-overlay hidden" id="cartOverlay" onclick="toggleCart()"></div>

<script src="js/data.js"></script>
<script>
  // Redirect if not logged in
  if (!sessionStorage.getItem('feedme_user')) {
    window.location.href = 'login.html';
  }

  // --- Load restaurant data ---

  const params     = new URLSearchParams(window.location.search);
  const restId     = parseInt(params.get('id')) || 1;
  const restaurant = (window.restaurants || []).find(r => r.id === restId);

  if (!restaurant) {
    window.location.href = 'index.html';
  }

  // Populate the restaurant banner
  document.title                          = restaurant.name + ' – FeedMe';
  document.getElementById('restName').textContent  = restaurant.name;
  document.getElementById('restDesc').textContent  = restaurant.description;
  document.getElementById('restRating').innerHTML  = '⭐ ' + restaurant.rating;
  document.getElementById('restTime').innerHTML    = '⏱ ' + restaurant.deliveryTime;
  document.getElementById('restPrice').innerHTML   = '🔥 ' + restaurant.priceRange;

  // --- State ---

  const menuItems  = restaurant.menu || [];
  let cart         = JSON.parse(sessionStorage.getItem('feedme_cart_' + restId) || '[]');
  let activeMenuCat = 'All';

  // --- Category filter buttons ---

  const menuCats   = ['All', ...new Set(menuItems.map(m => m.category))];
  const catSection = document.getElementById('menuCategories');

  catSection.innerHTML = menuCats.map((cat, i) =>
    `<button class="cat-btn ${i === 0 ? 'active' : ''}" onclick="setMenuCat('${cat}', this)">${cat}</button>`
  ).join('');

  function setMenuCat(cat, btn) {
    activeMenuCat = cat;
    document.querySelectorAll('#menuCategories .cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMenu();
  }

  // --- Menu rendering ---

  function renderMenu() {
    const query  = document.getElementById('menuSearch').value.toLowerCase();
    let filtered = menuItems;

    if (activeMenuCat !== 'All') {
      filtered = filtered.filter(m => m.category === activeMenuCat);
    }

    if (query) {
      filtered = filtered.filter(m => m.name.toLowerCase().includes(query));
    }

    const grid = document.getElementById('foodGrid');

    grid.innerHTML = filtered.map(item => {
      const cartItem = cart.find(c => c.id === item.id);
      const qty      = cartItem ? cartItem.qty : 0;

      // Show a qty stepper if already in cart, otherwise show the + button
      const addControl = qty > 0
        ? `<div class="qty-control">
             <button onclick="changeQty(${item.id}, -1)">−</button>
             <span>${qty}</span>
             <button onclick="changeQty(${item.id}, 1)">+</button>
           </div>`
        : `<button class="add-btn" onclick="addToCart(${item.id})">+</button>`;

      return `
        <div class="food-card">
          <div class="food-img-wrap">
            <img
              src="${item.image}"
              alt="${item.name}"
              onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'"
            >
          </div>
          <div class="food-card-content">
            <h4>${item.name}</h4>
            <p class="food-desc">${item.description}</p>
            <div class="price-add">
              <span class="food-price">$${item.price.toFixed(2)}</span>
              ${addControl}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // --- Cart logic ---

  function addToCart(id) {
    const item     = menuItems.find(m => m.id === id);
    const existing = cart.find(c => c.id === id);

    if (existing) {
      existing.qty++;
    } else {
      cart.push({ ...item, qty: 1 });
    }

    saveCart();
    renderMenu();
    renderCartSidebar();
  }

  function changeQty(id, delta) {
    const idx = cart.findIndex(c => c.id === id);
    if (idx === -1) return;

    cart[idx].qty += delta;

    // Remove the item if qty drops to zero
    if (cart[idx].qty <= 0) {
      cart.splice(idx, 1);
    }

    saveCart();
    renderMenu();
    renderCartSidebar();
  }

  function saveCart() {
    sessionStorage.setItem('feedme_cart_' + restId, JSON.stringify(cart));
    sessionStorage.setItem('feedme_current_rest', restId);
  }

  // --- Cart sidebar ---

  function renderCartSidebar() {
    const totalItems = cart.reduce((sum, c) => sum + c.qty, 0);
    const subtotal   = cart.reduce((sum, c) => sum + c.price * c.qty, 0);
    const total      = subtotal + 2.99;

    // Update item count
    document.getElementById('cartCount').textContent = totalItems;

    const badge = document.getElementById('cartBadge');
    if (totalItems > 0) {
      badge.textContent = totalItems;
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }

    const footer    = document.getElementById('cartFooter');
    const itemsList = document.getElementById('cartItems');

    if (cart.length === 0) {
      itemsList.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">🍕</div>
          <p>Nothing here yet</p>
          <small>Add some yummy food!</small>
        </div>
      `;
      footer.classList.add('hidden');
      return;
    }

    // Render each cart item
    itemsList.innerHTML = cart.map(c => `
      <div class="cart-item">
        <div class="cart-item-info">
          <span class="cart-item-name">${c.name}</span>
          <span class="cart-item-price">$${(c.price * c.qty).toFixed(2)}</span>
        </div>
        <div class="qty-control small">
          <button onclick="changeQty(${c.id}, -1)">−</button>
          <span>${c.qty}</span>
          <button onclick="changeQty(${c.id}, 1)">+</button>
        </div>
      </div>
    `).join('');

    document.getElementById('cartSubtotal').textContent = subtotal.toFixed(2);
    document.getElementById('cartTotal').textContent    = total.toFixed(2);
    footer.classList.remove('hidden');
  }

  // --- Mobile cart drawer ---

  function toggleCart() {
    document.getElementById('cartSidebar').classList.toggle('open');
    document.getElementById('cartOverlay').classList.toggle('hidden');
  }

  function goToCheckout() {
    window.location.href = 'checkout.html?id=' + restId;
  }

  // Initial render
  renderMenu();
  renderCartSidebar();
</script>
</body>
</html>
