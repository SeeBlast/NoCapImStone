<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurants — FeedMe</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
      }
    }
  </script>
  <script type="module" src="../../assets/js/pages/home.js"></script>
</head>
<body>

<header class="header">
  <a href="home.html" class="logo">
    <div class="logo-icon-sm">🍔</div>
    <div>
      <span class="logo-text">FeedMe</span>
      <div class="location">📍 Toronto, ON</div>
    </div>
  </a>
  <div class="header-right">
    <span class="user-greeting" id="userGreeting"></span>
    <a href="#" class="btn-logout" id="logoutBtn">Sign Out</a>
  </div>
</header>

<div class="yellow-bar"></div>

<section class="search-section">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search restaurants or cuisines…">
  </div>
</section>

<section class="categories" id="categories"></section>

<main class="restaurant-listing" id="restaurantGrid">
  <div class="no-results">Loading…</div>
</main>

</body>
</html>
